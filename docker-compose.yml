services:

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: dynamodb-local
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:2.15.30
    container_name: dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-2
    entrypoint: >
      sh -c "
      sleep 5 &&
      aws dynamodb create-table
      --table-name franchise
      --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S
      --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE
      --billing-mode PAY_PER_REQUEST
      --global-secondary-indexes '[{\"IndexName\":\"GSI_SK_PK\",\"KeySchema\":[{\"AttributeName\":\"SK\",\"KeyType\":\"HASH\"},{\"AttributeName\":\"PK\",\"KeyType\":\"RANGE\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
      --region us-east-2
      --endpoint-url http://dynamodb-local:8000 || true
      "
    restart: "no"

  franchise-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franchise-api
    ports:
      - "8080:8080"
    depends_on:
      - dynamodb-local
      - dynamodb-init
    environment:
      SPRING_PROFILES_ACTIVE: local
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-2
      AWS_ENDPOINT_OVERRIDE: http://dynamodb-local:8000
      AWS_DYNAMODB_TABLE_NAME: franchise