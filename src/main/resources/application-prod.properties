# Production profile — connects to real AWS DynamoDB
# aws.endpoint-override is intentionally absent (uses the real AWS endpoint)
# Inject the following via environment variables or ECS task definition:
#   AWS_REGION              -> maps to aws.region
#   DYNAMODB_TABLE_NAME     -> maps to aws.dynamodb.table-name
#   AWS_ACCESS_KEY_ID       -> picked up by the default AWS credential provider chain
#   AWS_SECRET_ACCESS_KEY   -> picked up by the default AWS credential provider chain
# Do NOT store real AWS credentials in this file.
aws.region=us-east-2
aws.dynamodb.table-name=franchise
